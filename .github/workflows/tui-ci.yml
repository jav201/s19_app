name: tui-ci

# Two-tier gate (batch-07 CI-1, operator decision 2026-06-10):
#  - PRs run the fast lean suite (-m "not slow", ~10 min) for quick feedback.
#  - Pushes to main / main-tui run the FULL suite (incl. slow perf smoke
#    tests, ~35 min) as the exhaustive post-merge gate.
on:
  pull_request:
    branches:
      - main
      - main-tui
  push:
    branches:
      - main
      - main-tui

jobs:
  tui-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest
          # Test-only dependency: tests/test_examples_pilot_gifs.py imports
          # PIL to render the example GIFs (dev tooling, not a runtime dep).
          python -m pip install pillow
          python -m pip install -e .

      - name: Run lean test suite (pull requests)
        if: github.event_name == 'pull_request'
        run: pytest -q -m "not slow"

      - name: Run full test suite (pushes)
        if: github.event_name == 'push'
        run: pytest -q
